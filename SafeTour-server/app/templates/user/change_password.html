<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>修改密码 - 安途-SafeTour</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', -apple-system, sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #d1fae5 0%, #dbeafe 50%, #ede9fe 100%);
            background-attachment: fixed;
        }
        .container { max-width: 520px; margin: 0 auto; padding: 40px 24px; }
        .brand-row { display: flex; align-items: center; justify-content: center; gap: 12px; margin-bottom: 30px; }
        .logo-img {
            width: 52px; height: 52px; border-radius: 14px;
            background: linear-gradient(135deg, #10b981, #6366f1); display: flex; align-items: center; justify-content: center;
            box-shadow: 0 6px 20px rgba(16,185,129,0.3); overflow: hidden;
        }
        .logo-img img { width: 100%; height: 100%; object-fit: contain; padding: 6px; background: #fff; border-radius: 10px; }
        .brand-title { font-size: 20px; font-weight: 700; color: #064e3b; letter-spacing: 0.5px; }
        h1 { color: #0f172a; margin-bottom: 28px; text-align: center; font-size: 26px; font-weight: 700; }
        .form-card {
            background: rgba(255,255,255,0.8); backdrop-filter: blur(12px);
            padding: 36px; border-radius: 24px; box-shadow: 0 8px 32px rgba(16,185,129,0.1);
            border: 1px solid rgba(255,255,255,0.6);
            animation: slideUp 0.6s ease-out;
        }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .form-group { margin-bottom: 22px; }
        .form-group label { display: block; margin-bottom: 10px; color: #334155; font-size: 14px; font-weight: 600; }
        .form-group input {
            width: 100%; padding: 15px 18px; border: 1.5px solid rgba(16,185,129,0.2);
            border-radius: 14px; font-size: 15px; background: rgba(255,255,255,0.7); color: #0f172a;
            transition: all 0.3s ease; outline: none;
        }
        .form-group input::placeholder { color: #94a3b8; }
        .form-group input:focus { border-color: #10b981; background: #fff; box-shadow: 0 0 0 4px rgba(16,185,129,0.1); }
        .btn {
            padding: 15px 24px; background: linear-gradient(135deg, #10b981, #6366f1);
            color: white; border: none; border-radius: 14px; font-size: 16px; font-weight: 600;
            cursor: pointer; width: 100%; transition: all 0.3s ease;
            box-shadow: 0 6px 20px rgba(99,102,241,0.25); margin-top: 8px;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(99,102,241,0.35); }
        .alert { padding: 14px 18px; margin-bottom: 22px; border-radius: 14px; display: none; font-size: 14px; font-weight: 500; border-left: 4px solid; }
        .alert-success { background: rgba(16,185,129,0.1); color: #065f46; border-left-color: #10b981; }
        .alert-error { background: rgba(239,68,68,0.1); color: #991b1b; border-left-color: #ef4444; }
        .back-link {
            display: block; text-align: center; margin-top: 22px; color: #6366f1; text-decoration: none;
            font-size: 14px; font-weight: 500; padding: 10px; border-radius: 10px; transition: all 0.2s ease;
        }
        .back-link:hover { background: rgba(99,102,241,0.08); }
    </style>
</head>
<body>
    <div class="container">
        <div class="brand-row">
            <div class="logo-img"><img src="/logo.png" alt="Logo"></div>
            <div class="brand-title">安途-SafeTour</div>
        </div>
        <h1>🔐 修改密码</h1>
        
        <div class="form-card">
            <div id="alert" class="alert"></div>
            
            <form id="changePasswordForm">
                <div class="form-group">
                    <label for="old_password">原密码</label>
                    <input type="password" id="old_password" name="old_password" required placeholder="请输入原密码">
                </div>
                
                <div class="form-group">
                    <label for="new_password">新密码</label>
                    <input type="password" id="new_password" name="new_password" required placeholder="请输入新密码">
                </div>
                
                <div class="form-group">
                    <label for="confirm_password">确认新密码</label>
                    <input type="password" id="confirm_password" name="confirm_password" required placeholder="请再次输入新密码">
                </div>
                
                <button type="submit" class="btn">确 认 修 改</button>
            </form>
            
            <a href="/user/menu" class="back-link">← 返回菜单</a>
        </div>
    </div>

    <script>
        // 显示提示框
        function showAlert(message, isSuccess) {
            const alert = document.getElementById("alert");
            alert.textContent = message;
            alert.className = "alert " + (isSuccess ? "alert-success" : "alert-error");
            alert.style.display = "block";
            setTimeout(() => {
                alert.style.display = "none";
            }, 3000);
        }

        // 修改密码表单提交
        document.getElementById("changePasswordForm").addEventListener("submit", function(e) {
            e.preventDefault();
            const formData = new FormData(this);
            
            // 验证两次密码是否一致
            const newPassword = document.getElementById("new_password").value;
            const confirmPassword = document.getElementById("confirm_password").value;
            if (newPassword !== confirmPassword) {
                showAlert("两次输入的新密码不一致", false);
                return;
            }
            
            fetch("/user/change_password", {
                method: "POST",
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                showAlert(data.msg, data.success);
                if (data.success) {
                    // 清空表单
                    this.reset();
                }
            })
            .catch(error => {
                showAlert("请求失败：" + error, false);
            });
        });
    </script>
</body>
</html>
