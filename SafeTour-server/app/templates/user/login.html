<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户登录 - 安途-SafeTour</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', -apple-system, sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            background-attachment: fixed;
            display: flex; align-items: center; justify-content: center; padding: 20px;
            overflow: hidden; position: relative;
        }
        body::before, body::after {
            content: ''; position: absolute; border-radius: 50%; background: rgba(255,255,255,0.15);
            animation: float 6s ease-in-out infinite;
        }
        body::before { width: 300px; height: 300px; top: -100px; left: -100px; }
        body::after { width: 200px; height: 200px; bottom: -50px; right: -50px; animation-delay: 2s; }
        @keyframes float { 0%, 100% { transform: translateY(0) scale(1); opacity: 0.5; } 50% { transform: translateY(-30px) scale(1.1); opacity: 0.3; } }
        .login-box {
            width: 420px; background: rgba(255,255,255,0.18);
            backdrop-filter: blur(20px) saturate(180%); -webkit-backdrop-filter: blur(20px) saturate(180%);
            padding: 45px 40px; border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.15), inset 0 1px 0 rgba(255,255,255,0.3);
            border: 1px solid rgba(255,255,255,0.3);
            animation: slideUp 0.6s ease-out; position: relative; z-index: 1;
        }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        .brand-area { text-align: center; margin-bottom: 30px; }
        .logo-img {
            width: 72px; height: 72px; margin: 0 auto 15px; border-radius: 20px;
            background: linear-gradient(135deg, #ffffff 0%, #f0f0ff 100%); display: flex; align-items: center; justify-content: center;
            box-shadow: 0 10px 30px rgba(16,185,129,0.3); overflow: hidden;
        }
        .logo-img img { width: 100%; height: 100%; object-fit: contain; }
        .brand-name { font-size: 26px; font-weight: 700; color: #fff; text-shadow: 0 2px 10px rgba(0,0,0,0.2); letter-spacing: 1px; }
        .brand-sub { font-size: 13px; color: rgba(255,255,255,0.85); margin-top: 6px; letter-spacing: 2px; }
        .login-box h2 { text-align: center; margin-bottom: 28px; color: #fff; font-size: 20px; font-weight: 600; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; color: rgba(255,255,255,0.9); font-size: 14px; font-weight: 500; }
        .form-group input {
            width: 100%; padding: 14px 18px; border: 1px solid rgba(255,255,255,0.3);
            border-radius: 14px; font-size: 15px; background: rgba(255,255,255,0.2); color: #fff;
            transition: all 0.3s ease; outline: none;
        }
        .form-group input::placeholder { color: rgba(255,255,255,0.6); }
        .form-group input:focus {
            border-color: rgba(255,255,255,0.6); background: rgba(255,255,255,0.3);
            box-shadow: 0 0 0 4px rgba(255,255,255,0.1);
        }
        .btn {
            width: 100%; padding: 15px; background: linear-gradient(135deg, #fff 0%, #f8f9ff 100%);
            color: #6366f1; border: none; border-radius: 14px; font-size: 16px; font-weight: 600;
            cursor: pointer; transition: all 0.3s ease; margin-top: 8px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 12px 28px rgba(0,0,0,0.2); }
        .btn:active { transform: translateY(0); }
        .error {
            color: #fff; text-align: center; margin-bottom: 18px; padding: 12px 16px;
            background: rgba(239,68,68,0.3); border: 1px solid rgba(239,68,68,0.5); border-radius: 12px;
            font-size: 14px; animation: shake 0.5s ease;
        }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }
    </style>
</head>
<body>
    <div class="login-box">
        <div class="brand-area">
            <div class="logo-img"><img src="/logo.png" alt="Logo"></div>
            <div class="brand-name">安途-SafeTour</div>
            <div class="brand-sub">安 全 出 行 管 理 系 统</div>
        </div>
        <h2>用户登录</h2>
        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}
        <form method="POST">
            <div class="form-group">
                <label for="username">用户名</label>
                <input type="text" id="username" name="username" required placeholder="请输入用户名">
            </div>
            <div class="form-group">
                <label for="password">密码</label>
                <input type="password" id="password" name="password" required placeholder="请输入密码">
            </div>
            <button type="submit" class="btn">登 录</button>
        </form>
    </div>
</body>
</html>
