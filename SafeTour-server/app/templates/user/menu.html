<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户菜单 - 安途-SafeTour</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', -apple-system, sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #d1fae5 0%, #dbeafe 50%, #ede9fe 100%);
            background-attachment: fixed;
        }
        .container { max-width: 820px; margin: 0 auto; padding: 40px 24px; }
        /* 顶部欢迎区 */
        .header {
            text-align: center;
            margin-bottom: 40px;
            padding: 36px;
            background: rgba(255,255,255,0.75);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            box-shadow: 0 8px 32px rgba(16,185,129,0.1);
            border: 1px solid rgba(255,255,255,0.6);
            animation: slideDown 0.6s ease-out;
        }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        .brand-row { display: flex; align-items: center; justify-content: center; gap: 12px; margin-bottom: 20px; }
        .logo-img {
            width: 52px; height: 52px; border-radius: 14px;
            background: linear-gradient(135deg, #10b981, #6366f1); display: flex; align-items: center; justify-content: center;
            box-shadow: 0 6px 20px rgba(16,185,129,0.3); overflow: hidden;
        }
        .logo-img img { width: 100%; height: 100%; object-fit: contain; padding: 6px; background: #fff; border-radius: 10px; }
        .brand-title { font-size: 22px; font-weight: 700; color: #064e3b; letter-spacing: 0.5px; }
        .header h1 { color: #0f172a; font-size: 26px; margin-bottom: 8px; font-weight: 700; }
        .header p { color: #475569; font-size: 15px; }
        /* 菜单区域 */
        .menu-section { margin-bottom: 32px; }
        .section-title {
            display: flex; align-items: center; gap: 10px;
            color: #0f172a; margin-bottom: 16px; font-size: 18px; font-weight: 700;
        }
        /* 任务列表 */
        .task-list {
            background: rgba(255,255,255,0.6);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 8px 32px rgba(16,185,129,0.08);
            border: 1px solid rgba(255,255,255,0.6);
        }
        .task-item {
            background: #fff;
            padding: 18px 22px;
            margin-bottom: 10px;
            border-radius: 14px;
            box-shadow: 0 2px 8px rgba(15,23,42,0.05);
            cursor: pointer;
            transition: all 0.3s ease;
            border: 1.5px solid transparent;
        }
        .task-item:last-child { margin-bottom: 0; }
        .task-item:hover {
            transform: translateY(-3px) translateX(4px);
            box-shadow: 0 8px 24px rgba(16,185,129,0.15);
            border-color: rgba(16,185,129,0.2);
            background: linear-gradient(135deg, #fff, #f0fdf4);
        }
        .task-item a { display: block; color: #0f172a; text-decoration: none; display: flex; justify-content: space-between; align-items: center; }
        .task-item .task-info { font-size: 16px; font-weight: 600; color: #0f172a; }
        .task-item .task-meta { font-size: 13px; color: #64748b; margin-top: 4px; }
        .task-item .task-arrow { font-size: 20px; color: #10b981; transition: transform 0.3s ease; }
        .task-item:hover .task-arrow { transform: translateX(6px); }
        /* 功能按钮 */
        .action-buttons { display: flex; gap: 14px; margin-top: 8px; flex-wrap: wrap; }
        .btn {
            padding: 14px 28px; border: none; border-radius: 14px; font-size: 15px; font-weight: 600;
            cursor: pointer; text-decoration: none; display: inline-flex; align-items: center; gap: 8px;
            text-align: center; transition: all 0.3s ease;
        }
        .btn-primary {
            background: linear-gradient(135deg, #6366f1, #a855f7); color: white;
            box-shadow: 0 6px 20px rgba(99,102,241,0.25);
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(99,102,241,0.35); }
        .btn-secondary {
            background: rgba(255,255,255,0.8); color: #475569;
            border: 1.5px solid rgba(148,163,184,0.3);
        }
        .btn-secondary:hover { transform: translateY(-2px); background: #fff; border-color: #94a3b8; }
        /* 空状态 */
        .empty-state { text-align: center; padding: 50px 20px; color: #64748b; }
        .empty-state .emoji { font-size: 56px; display: block; margin-bottom: 12px; opacity: 0.7; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="brand-row">
                <div class="logo-img"><img src="/logo.png" alt="Logo"></div>
                <div class="brand-title">安途-SafeTour</div>
            </div>
            <h1>欢迎回来，{{ nickname }}！👋</h1>
            <p>这里是您的任务管理中心</p>
        </div>

        <div class="menu-section">
            <div class="section-title">📋 我的授权任务</div>
            <div class="task-list">
                {% if authorized_tasks %}
                    {% for task in authorized_tasks %}
                    <div class="task-item">
                        <a href="/user/task_data/{{ task.id|urlencode }}">
                            <div>
                                <div class="task-info">{{ task.id }}</div>
                                <div class="task-meta">参与人数：{{ task.participant_count }}人</div>
                            </div>
                            <div class="task-arrow">→</div>
                        </a>
                    </div>
                    {% endfor %}
                {% else %}
                    <div class="empty-state">
                        <span class="emoji">📭</span>
                        暂无授权任务
                    </div>
                {% endif %}
            </div>
        </div>

        <div class="action-buttons">
            <a href="/user/change_password" class="btn btn-primary">🔐 修改密码</a>
            <a href="/user/logout" class="btn btn-secondary">🚪 退出登录</a>
        </div>
    </div>
</body>
</html>
