<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户管理 - 安途-SafeTour</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', -apple-system, sans-serif;
            background: linear-gradient(135deg, #e0e7ff 0%, #f3e8ff 50%, #fce7f3 100%);
            min-height: 100vh;
        }
        .container { display: flex; min-height: 100vh; }
        .sidebar {
            width: 240px;
            background: rgba(30, 41, 59, 0.92);
            backdrop-filter: blur(16px);
            color: white; padding: 24px 0; display: flex; flex-direction: column;
            border-right: 1px solid rgba(255,255,255,0.1);
        }
        .brand { display: flex; align-items: center; gap: 12px; padding: 0 24px 24px; border-bottom: 1px solid rgba(255,255,255,0.08); margin-bottom: 16px; }
        .brand-logo { width: 44px; height: 44px; border-radius: 12px; overflow: hidden; background: linear-gradient(135deg, #6366f1, #a855f7); display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 12px rgba(99,102,241,0.4); }
        .brand-logo img { width: 100%; height: 100%; object-fit: contain; padding: 6px; background: #fff; }
        .brand-text { font-size: 17px; font-weight: 700; letter-spacing: 0.5px; }
        .brand-text small { display: block; font-size: 11px; font-weight: 400; color: rgba(255,255,255,0.5); margin-top: 2px; letter-spacing: 1.5px; }
        .nav-list { flex: 1; padding: 0 12px; }
        .sidebar a { display: flex; align-items: center; gap: 12px; padding: 12px 16px; color: rgba(255,255,255,0.8); text-decoration: none; transition: all 0.3s ease; border-radius: 12px; margin-bottom: 4px; font-size: 14px; }
        .sidebar a:hover { background: rgba(255,255,255,0.08); color: #fff; transform: translateX(4px); }
        .sidebar a::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: rgba(255,255,255,0.3); }
        .sidebar a:hover::before { background: #10b981; }
        .sidebar a.active { background: linear-gradient(135deg, rgba(99,102,241,0.4), rgba(168,85,247,0.4)); color: #fff; box-shadow: inset 0 0 0 1px rgba(255,255,255,0.1); }
        .sidebar a.active::before { background: #10b981; box-shadow: 0 0 8px #10b981; }
        .sidebar .logout { margin-top: auto; padding: 0 12px; }
        .sidebar .logout a { color: #f87171; background: rgba(248,113,113,0.1); justify-content: center; }
        .sidebar .logout a:hover { background: rgba(248,113,113,0.2); color: #fca5a5; }
        .content { flex: 1; padding: 40px; overflow-y: auto; }
        .content h2 { color: #1e293b; font-size: 28px; margin-bottom: 8px; font-weight: 700; }
        .content .subtitle { color: #64748b; font-size: 15px; margin-bottom: 28px; }
        .form-card, .table-card {
            background: rgba(255,255,255,0.75); backdrop-filter: blur(12px);
            padding: 28px; border-radius: 20px; box-shadow: 0 8px 32px rgba(99,102,241,0.08);
            border: 1px solid rgba(255,255,255,0.8); margin-bottom: 28px;
        }
        .form-card h3, .table-card h3 { color: #1e293b; font-size: 18px; margin-bottom: 18px; padding-bottom: 12px; border-bottom: 2px solid #e2e8f0; font-weight: 700; }
        .form-row { display: flex; gap: 16px; flex-wrap: wrap; align-items: flex-end; }
        .form-group { flex: 1; min-width: 180px; }
        .form-group label { display: block; margin-bottom: 8px; color: #334155; font-size: 13px; font-weight: 600; }
        .form-group input { width: 100%; padding: 12px 16px; border: 1.5px solid #e2e8f0; border-radius: 12px; font-size: 14px; background: #fff; outline: none; transition: all 0.2s ease; }
        .form-group input:focus { border-color: #6366f1; box-shadow: 0 0 0 4px rgba(99,102,241,0.1); }
        .btn { padding: 12px 24px; background: linear-gradient(135deg, #6366f1, #a855f7); color: white; border: none; border-radius: 12px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.3s ease; box-shadow: 0 4px 16px rgba(99,102,241,0.3); }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(99,102,241,0.4); }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 14px 16px; text-align: left; border-bottom: 1px solid #f1f5f9; font-size: 14px; }
        th { background: linear-gradient(135deg, #f8fafc, #f1f5f9); color: #475569; font-weight: 600; font-size: 13px; letter-spacing: 0.5px; }
        tbody tr { transition: background 0.2s ease; }
        tbody tr:hover { background: rgba(99,102,241,0.04); }
        .delete-btn { color: white; background: linear-gradient(135deg, #ef4444, #dc2626); border: none; padding: 8px 16px; border-radius: 10px; cursor: pointer; font-size: 13px; font-weight: 500; transition: all 0.2s ease; }
        .delete-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(239,68,68,0.3); }
        .alert { padding: 14px 20px; margin-bottom: 20px; border-radius: 14px; display: none; font-size: 14px; font-weight: 500; border-left: 4px solid; }
        .alert-success { background: rgba(16,185,129,0.1); color: #065f46; border-left-color: #10b981; }
        .alert-error { background: rgba(239,68,68,0.1); color: #991b1b; border-left-color: #ef4444; }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <div class="brand">
                <div class="brand-logo"><img src="/logo.png" alt="Logo"></div>
                <div class="brand-text">安途-SafeTour<small>管 理 后 台</small></div>
            </div>
            <div class="nav-list">
                <a href="/admin/user_manage" class="active">用户管理</a>
                <a href="/admin/task_create">创建任务</a>
                <a href="/admin/task_auth">任务权限</a>
                <a href="/admin/task_manage">任务管理</a>
                <a href="/admin/qq_push">QQ推送管理</a>
                <a href="/admin/about">关于</a>
            </div>
            <div class="logout">
                <a href="/admin/logout">退出登录</a>
            </div>
        </div>
        <div class="content">
            <h2>用户管理</h2>
            <div class="subtitle">管理系统用户账户</div>

            <div id="alert" class="alert"></div>

            <div class="form-card">
                <h3>➕ 添加新用户</h3>
                <form id="addUserForm">
                    <div class="form-row">
                        <div class="form-group">
                            <label>昵称</label>
                            <input type="text" id="nickname" name="nickname" required placeholder="用户昵称">
                        </div>
                        <div class="form-group">
                            <label>用户名</label>
                            <input type="text" id="username" name="username" required placeholder="登录用户名">
                        </div>
                        <div class="form-group">
                            <label>密码</label>
                            <input type="password" id="password" name="password" required placeholder="登录密码">
                        </div>
                        <button type="submit" class="btn">添加用户</button>
                    </div>
                </form>
            </div>

            <div class="table-card">
                <h3>👥 用户列表</h3>
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>昵称</th>
                            <th>用户名</th>
                            <th>密码</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for user in users %}
                        <tr id="user-{{ user.id }}">
                            <td>{{ user.id }}</td>
                            <td><strong>{{ user.nickname }}</strong></td>
                            <td>{{ user.username }}</td>
                            <td style="color: #64748b;">{{ user.password }}</td>
                            <td>
                                <button class="delete-btn" data-id="{{ user.id }}">删除</button>
                            </td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // 显示提示框
        function showAlert(message, isSuccess) {
            const alert = document.getElementById("alert");
            alert.textContent = message;
            alert.className = "alert " + (isSuccess ? "alert-success" : "alert-error");
            alert.style.display = "block";
            setTimeout(() => {
                alert.style.display = "none";
            }, 3000);
        }

        // 添加用户
        document.getElementById("addUserForm").addEventListener("submit", function(e) {
            e.preventDefault();
            const formData = new FormData(this);
            
            fetch("/admin/user_manage", {
                method: "POST",
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                showAlert(data.msg, data.success);
                if (data.success) {
                    // 刷新页面
                    window.location.reload();
                }
            })
            .catch(error => {
                showAlert("请求失败：" + error, false);
            });
        });

        // 删除用户
        document.querySelectorAll(".delete-btn").forEach(btn => {
            btn.addEventListener("click", function() {
                if (!confirm("确定要删除该用户吗？")) {
                    return;
                }
                const userId = this.getAttribute("data-id");
                const formData = new FormData();
                formData.append("user_id", userId);
                
                fetch("/admin/user_delete", {
                    method: "POST",
                    body: formData
                })
                .then(response => response.json())
                .then(data => {
                    showAlert(data.msg, data.success);
                    if (data.success) {
                        // 删除表格行
                        document.getElementById("user-" + userId).remove();
                    }
                })
                .catch(error => {
                    showAlert("请求失败：" + error, false);
                });
            });
        });
    </script>
</body>
</html>
