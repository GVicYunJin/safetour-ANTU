<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理员首页 - 安途-SafeTour</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', -apple-system, sans-serif;
            background: linear-gradient(135deg, #e0e7ff 0%, #f3e8ff 50%, #fce7f3 100%);
            min-height: 100vh;
        }
        .container { display: flex; min-height: 100vh; }
        /* 左侧菜单 */
        .sidebar {
            width: 240px;
            background: rgba(30, 41, 59, 0.92);
            backdrop-filter: blur(16px);
            color: white;
            padding: 24px 0;
            display: flex;
            flex-direction: column;
            border-right: 1px solid rgba(255,255,255,0.1);
        }
        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 0 24px 24px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            margin-bottom: 16px;
        }
        .brand-logo {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            overflow: hidden;
            background: linear-gradient(135deg, #6366f1, #a855f7);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 12px rgba(99,102,241,0.4);
        }
        .brand-logo img { width: 100%; height: 100%; object-fit: contain; padding: 6px; background: #fff; }
        .brand-text { font-size: 17px; font-weight: 700; letter-spacing: 0.5px; }
        .brand-text small { display: block; font-size: 11px; font-weight: 400; color: rgba(255,255,255,0.5); margin-top: 2px; letter-spacing: 1.5px; }
        .nav-list { flex: 1; padding: 0 12px; }
        .sidebar a {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            color: rgba(255,255,255,0.8);
            text-decoration: none;
            transition: all 0.3s ease;
            border-radius: 12px;
            margin-bottom: 4px;
            font-size: 14px;
        }
        .sidebar a:hover {
            background: rgba(255,255,255,0.08);
            color: #fff;
            transform: translateX(4px);
        }
        .sidebar a::before {
            content: '';
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: rgba(255,255,255,0.3);
        }
        .sidebar a:hover::before { background: #10b981; }
        .sidebar a.active {
            background: linear-gradient(135deg, rgba(99,102,241,0.3), rgba(168,85,247,0.3));
            color: #fff;
            box-shadow: inset 0 0 0 1px rgba(255,255,255,0.1);
        }
        .sidebar a.active::before { background: #10b981; box-shadow: 0 0 8px #10b981; }
        .sidebar .logout { margin-top: auto; padding: 0 12px; }
        .sidebar .logout a { color: #f87171; background: rgba(248,113,113,0.1); justify-content: center; }
        .sidebar .logout a:hover { background: rgba(248,113,113,0.2); color: #fca5a5; }
        /* 右侧内容 */
        .content { flex: 1; padding: 40px; overflow-y: auto; }
        .content h2 {
            color: #1e293b;
            font-size: 28px;
            margin-bottom: 8px;
            font-weight: 700;
        }
        .content .subtitle { color: #64748b; font-size: 15px; margin-bottom: 32px; }
        /* 欢迎卡片 */
        .welcome-card {
            background: rgba(255,255,255,0.75);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            padding: 36px;
            box-shadow: 0 8px 32px rgba(99,102,241,0.08);
            border: 1px solid rgba(255,255,255,0.8);
            margin-bottom: 28px;
            position: relative;
            overflow: hidden;
        }
        .welcome-card::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -20%;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(99,102,241,0.15) 0%, transparent 70%);
            border-radius: 50%;
        }
        .welcome-card > * { position: relative; }
        .welcome-title { font-size: 24px; font-weight: 700; color: #1e293b; margin-bottom: 12px; }
        .welcome-desc { color: #64748b; font-size: 15px; line-height: 1.7; margin-bottom: 16px; }
        .time-display {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 12px 20px;
            background: linear-gradient(135deg, #6366f1, #a855f7);
            color: #fff;
            border-radius: 14px;
            font-size: 15px;
            font-weight: 500;
            box-shadow: 0 4px 16px rgba(99,102,241,0.3);
        }
        /* 快捷模块卡片 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
        }
        .stat-card {
            background: rgba(255,255,255,0.8);
            backdrop-filter: blur(10px);
            padding: 24px;
            border-radius: 18px;
            box-shadow: 0 4px 20px rgba(99,102,241,0.06);
            border: 1px solid rgba(255,255,255,0.6);
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            color: inherit;
        }
        .stat-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 12px 32px rgba(99,102,241,0.15);
        }
        .stat-icon {
            width: 52px;
            height: 52px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            margin-bottom: 14px;
        }
        .stat-card:nth-child(1) .stat-icon { background: linear-gradient(135deg, #fce7f3, #fbcfe8); }
        .stat-card:nth-child(2) .stat-icon { background: linear-gradient(135deg, #dbeafe, #bfdbfe); }
        .stat-card:nth-child(3) .stat-icon { background: linear-gradient(135deg, #d1fae5, #a7f3d0); }
        .stat-card:nth-child(4) .stat-icon { background: linear-gradient(135deg, #fef3c7, #fde68a); }
        .stat-title { font-size: 16px; font-weight: 600; color: #1e293b; margin-bottom: 6px; }
        .stat-desc { font-size: 13px; color: #64748b; }
    </style>
</head>
<body>
    <div class="container">
        <!-- 左侧菜单 -->
        <div class="sidebar">
            <div class="brand">
                <div class="brand-logo"><img src="/logo.png" alt="Logo"></div>
                <div class="brand-text">安途-SafeTour<small>管 理 后 台</small></div>
            </div>
            <div class="nav-list">
                <a href="/admin/user_manage">用户管理</a>
                <a href="/admin/task_create">创建任务</a>
                <a href="/admin/task_auth">任务权限</a>
                <a href="/admin/task_manage">任务管理</a>
                <a href="/admin/qq_push">QQ推送管理</a>
                <a href="/admin/about">关于</a>
            </div>
            <div class="logout">
                <a href="/admin/logout">退出登录</a>
            </div>
        </div>
        <!-- 右侧内容 -->
        <div class="content">
            <h2>欢迎回来 👋</h2>
            <div class="subtitle">这里是安途-SafeTour 管理系统控制台</div>

            <div class="welcome-card">
                <div class="welcome-title">欢迎使用 安途-SafeTour 管理系统</div>
                <div class="welcome-desc">请从左侧菜单选择需要操作的功能模块，系统为您提供用户管理、任务创建与管理、权限分配、QQ推送等完整功能。</div>
                <div class="time-display">🕐 当前系统时间：<span id="datetime"></span></div>
            </div>

            <div class="stats-grid">
                <a href="/admin/user_manage" class="stat-card">
                    <div class="stat-icon">👥</div>
                    <div class="stat-title">用户管理</div>
                    <div class="stat-desc">管理系统用户账号</div>
                </a>
                <a href="/admin/task_create" class="stat-card">
                    <div class="stat-icon">➕</div>
                    <div class="stat-title">创建任务</div>
                    <div class="stat-desc">发起新的出行任务</div>
                </a>
                <a href="/admin/task_manage" class="stat-card">
                    <div class="stat-icon">📋</div>
                    <div class="stat-title">任务管理</div>
                    <div class="stat-desc">查看和管理所有任务</div>
                </a>
                <a href="/admin/qq_push" class="stat-card">
                    <div class="stat-icon">📢</div>
                    <div class="stat-title">QQ推送</div>
                    <div class="stat-desc">配置消息推送服务</div>
                </a>
            </div>
        </div>
    </div>

    <script>
        function updateTime() {
            const now = new Date();
            document.getElementById("datetime").textContent = now.toLocaleString("zh-CN");
        }
        updateTime();
        setInterval(updateTime, 1000);
    </script>
</body>
</html>
